<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reaction Click Game - Nathan Burdett</title>

<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        /* Navy Blue Background */
        background-color: #0a192f; 
        color: #e6f1ff;
    }

    header {
        background: linear-gradient(rgba(10, 25, 47, 0.7), rgba(10, 25, 47, 0.7)), url('mountains.jpeg');
        background-size: cover;
        background-position: center;
        color: white;
        padding: 80px 20px;
        text-align: center;
        min-height: 300px;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    nav {
        background: #111827;
        padding: 12px;
        text-align: center;
        position: sticky;
        top: 0;
        z-index: 1000;
        border-bottom: 1px solid #1e293b;
    }

    nav a {
        color: #d1d5db;
        margin: 0 15px;
        text-decoration: none;
        font-weight: 500;
    }

    nav a:hover {
        color: #64ffda; /* Light Teal highlight */
    }

    main {
        max-width: 900px;
        margin: 40px auto;
        padding: 20px;
    }

    .game-wrapper {
        background: #112240; /* Slightly lighter Navy for contrast */
        border-radius: 16px;
        padding: 40px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        border: 1px solid #233554;
    }

    .stats {
        display: flex;
        justify-content: center;
        gap: 40px;
        margin-bottom: 30px;
        font-size: 22px;
        font-weight: bold;
        color: #64ffda;
    }

    /* LIGHT BLUE BUTTON STYLING */
    .start-btn {
        background: #7dd3fc; /* Light Blue */
        color: #0a192f; /* Dark text for contrast */
        border: none;
        padding: 15px 40px;
        border-radius: 50px;
        cursor: pointer;
        font-weight: bold;
        font-size: 18px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 14px rgba(125, 211, 252, 0.3);
    }

    .start-btn:hover {
        background: #38bdf8; /* Slightly deeper blue on hover */
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(125, 211, 252, 0.5);
    }

    #gameArea {
        position: relative;
        height: 400px;
        background: #020c1b; /* Deepest blue for game area */
        border-radius: 12px;
        overflow: hidden;
        margin-top: 30px;
        border: 2px solid #233554;
    }

    /* FIXED TARGET */
    #target {
        position: absolute;
        display: none;
        width: 60px;
        height: 60px;
        background: #64ffda; /* Teal target for visibility */
        color: #0a192f;
        border: none;
        border-radius: 50%;
        cursor: pointer;
        font-weight: bold;
        font-size: 14px;
        box-shadow: 0 0 15px rgba(100, 255, 218, 0.6);
        transition: transform 0.1s;
    }

    #target:active {
        transform: scale(0.9);
    }

    footer {
        text-align: center;
        padding: 40px;
        color: #8892b0;
    }

    html {
        scroll-behavior: smooth;
    }
</style>
</head>

<body>

<header>
    <h1>Mini Game: Reaction Click</h1>
    <p>Test your speed: Click the target before time runs out!</p>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="resume.html">Resume</a>
    <a href="basketball.html">Basketball</a>
    <a href="games.html">Games</a>
</nav>

<main>
    <div class="game-wrapper">

        <h2 style="text-align:center; color: #ccd6f6; margin-top: 0;">High Speed Training</h2>

        <div class="stats">
            <div><strong>Time:</strong> <span id="time">15</span>s</div>
            <div><strong>Score:</strong> <span id="score">0</span></div>
        </div>

        <div style="text-align:center;">
            <button class="start-btn" onclick="startGame()">Start Game</button>
        </div>

        <div id="gameArea">
            <button id="target" onclick="scorePoint()">Click!</button>
        </div>

    </div>
</main>

<footer>
    <p>© 2026 Nathan Burdett</p>
</footer>

<script>
let timeLeft = 15;
let score = 0;
let gameInterval;

function startGame() {
    clearInterval(gameInterval);

    timeLeft = 15;
    score = 0;

    document.getElementById("time").innerText = timeLeft;
    document.getElementById("score").innerText = score;

    const target = document.getElementById("target");
    target.style.display = "block";

    moveTarget();

    gameInterval = setInterval(() => {
        timeLeft--;
        document.getElementById("time").innerText = timeLeft;

        if (timeLeft <= 0) {
            clearInterval(gameInterval);
            target.style.display = "none";
            alert("Game Over! Final score: " + score);
        }
    }, 1000);
}

function scorePoint() {
    score++;
    document.getElementById("score").innerText = score;
    moveTarget();
}

function moveTarget() {
    const target = document.getElementById("target");
    const gameArea = document.getElementById("gameArea");

    // Account for target width/height (60px)
    const maxX = gameArea.clientWidth - 60;
    const maxY = gameArea.clientHeight - 60;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    target.style.left = x + "px";
    target.style.top = y + "px";
}
</script>

</body>
</html>
